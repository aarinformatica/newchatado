<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body class="theme-classic">

    <canvas id="particleCanvas"></canvas>

    <div class="perspective-container">
        <div class="app-card" id="card">
            
            <i class="fa-solid fa-palette theme-icon-btn" id="themePickerBtn"></i>
            
            <div class="theme-menu" id="themeMenu">
                <button class="theme-option active" data-theme="classic"><i class="fa-solid fa-circle-half-stroke"></i></button>
                <button class="theme-option" data-theme="sunset"><i class="fa-solid fa-sun"></i></button>
                <button class="theme-option" data-theme="forest"><i class="fa-solid fa-tree"></i></button>
                <button class="theme-option" data-theme="cyber"><i class="fa-solid fa-microchip"></i></button>
                <button class="theme-option" data-theme="vaporwave"><i class="fa-solid fa-clapperboard"></i></button>
                <button class="theme-option" data-theme="dracula"><i class="fa-solid fa-moon"></i></button>
                <button class="theme-option" data-theme="mars"><i class="fa-solid fa-user-astronaut"></i></button>
                <button class="theme-option" data-theme="luxury"><i class="fa-solid fa-crown"></i></button>
            </div>

            <div class="presence-menu" id="presenceMenu">
                <div class="presence-header">USUÁRIOS ONLINE</div>
                <ul id="userList"></ul>
            </div>

            <div class="inner-content">
                <div id="authSection" class="screen active">
                    <header class="app-header">
                        <i class="fa-solid fa-comments logo-icon"></i>
                        <h1 class="app-title">
                            <span class="part-chat">CHAT</span><span class="part-ado" data-text="ADO">ADO</span>
                        </h1>
                        <p class="app-tagline">Conexões imersivas em tempo real.</p>
                    </header>
                    
                    <div class="input-group">
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user" id="userIcon"></i>
                            <input type="text" id="userName" placeholder="Seu apelido..." maxlength="15" autocomplete="off">
                        </div>
                        <button class="btn-primary" id="startBtn" disabled>
                            <span>ENTRAR NO CHAT</span>
                            <i class="fa-solid fa-rocket"></i>
                        </button>
                    </div>

                    <footer class="app-footer">
                        <div class="footer-content">
                            <i class="fa-solid fa-shield-halved"></i>
                            <span class="footer-text">Ambiente Criptografado</span>
                        </div>
                    </footer>
                </div>

                <div id="chatSection" class="screen">
                    <header class="chat-header">
                        <div class="user-info">
                            <div class="status-dot"></div>
                            <span id="displayUserName">...</span>
                        </div>
                        <div class="online-counter" id="onlineCounterBtn">
                            <i class="fa-solid fa-users"></i>
                            <span id="onlineCount">0</span>
                        </div>
                        <i class="fa-solid fa-power-off logout-btn" id="logoutBtn"></i>
                    </header>
                    
                    <div id="chatMessages" class="chat-messages"></div>

                    <div id="typingIndicator" class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span id="typingText"></span>
                    </div>
                    
                    <div class="chat-input-area">
                        <div class="emoji-menu" id="emojiMenu">
                            <div class="emoji-item">😀</div><div class="emoji-item">😂</div><div class="emoji-item">😍</div>
                            <div class="emoji-item">😎</div><div class="emoji-item">🤔</div><div class="emoji-item">🔥</div>
                            <div class="emoji-item">🚀</div><div class="emoji-item">✨</div><div class="emoji-item">❤️</div>
                            <div class="emoji-item">👍</div><div class="emoji-item">🎮</div><div class="emoji-item">🌈</div>
                        </div>
                        
                        <button class="emoji-trigger" id="emojiBtn">
                            <i class="fa-regular fa-face-smile"></i>
                        </button>
                        
                        <input type="text" id="chatInput" placeholder="Sua mensagem..." autocomplete="off">
                        <button id="sendBtn" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
