<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHATADO - Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-clean">

    <div id="theme-loader" class="theme-loader" style="display: none;">
        <div class="spinner"></div>
        <p>Autenticando Hierarquia...</p>
    </div>

    <main id="login-screen" class="screen-container">
        <div id="main-box" class="login-box">
            <button id="open-theme-modal" class="theme-btn-corner"><i class="fa-solid fa-palette"></i></button>
            <div class="icon-wrapper">
                <i id="secret-icon" class="fa-solid fa-comments chat-icon pulse-anim"></i>
            </div>
            <h1 class="logo-text">CHAT<span class="logo-suffix">ADO</span></h1>
            <p class="subtitle">Controle de Administrador</p>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Seu apelido..." required autocomplete="off">
                <input type="password" id="admin-pass" placeholder="Senha de Acesso" autocomplete="off" style="display:none; margin-top:10px;">
                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </main>

    <main id="chat-area" class="screen-container" style="display: none;">
        <div class="chat-box">
            <div class="chat-header">
                <div class="chat-user-info">
                    <div class="dropdown-wrapper">
                        <button id="menu-toggle" class="chat-action-btn menu-icon">
                            <i class="fa-solid fa-users"></i>
                            <span id="online-count">0</span>
                        </button>
                        <div id="side-menu" class="floating-menu">
                            <div class="menu-pointer"></div>
                            <div class="menu-header-inner">MEMBROS ONLINE</div>
                            <ul id="user-list" class="user-list-flow"></ul>
                        </div>
                    </div>
                    <div class="user-text-wrapper">
                        <span id="user-display">Usuário</span>
                        <small id="chat-status">Membro Ativo</small>
                    </div>
                </div>

                <div class="chat-header-actions">
                    <button id="btn-master-panel" class="chat-action-btn master-btn" title="Painel de Controle" style="display:none;">
                        <i class="fa-solid fa-shield-halved"></i>
                    </button>
                    <button class="chat-action-btn" id="chat-theme-btn"><i class="fa-solid fa-palette"></i></button>
                    <button id="btn-sair" class="chat-action-btn exit"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>

            <div id="messages-container" class="chat-content"></div>

            <div id="typing-monitor" style="height: 20px; font-size: 0.8em; color: #00ff88; padding-left: 15px; font-style: italic;"></div>

            <div class="chat-input-wrapper">
                <input type="text" id="msg-input" placeholder="Sua mensagem..." autocomplete="off">
                <button id="btn-enviar"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <div id="master-modal" class="modal-overlay">
        <div class="theme-compact-box master-box">
            <h3 class="modal-title"><i class="fa-solid fa-crown"></i> Painel Master</h3>
            <ul id="master-user-list" class="master-list"></ul>
            <button id="btn-clear-all" class="btn-clear-all-red" style="display:none;">LIMPAR TODO O CHAT</button>
            <button id="btn-close-master" class="btn-close-master">FECHAR</button>
        </div>
    </div>

    <div id="punish-modal" class="modal-overlay">
        <div class="theme-compact-box punish-ui">
            <i class="fa-solid fa-hand fa-3x pulse-red"></i>
            <h3 class="modal-title">SUSPENSO</h3>
            <p>Você está de castigo por 10 segundos.</p>
            <div id="punish-timer">10</div>
        </div>
    </div>

    <div id="theme-modal" class="modal-overlay">
        <div class="theme-compact-box">
            <h3 class="modal-title">Estilos</h3>
            <div class="theme-grid">
                <div class="theme-opt-circle" data-theme="theme-clean"><i class="fa-solid fa-sun"></i></div>
                <div class="theme-opt-circle" data-theme="theme-dark"><i class="fa-solid fa-moon"></i></div>
                <div class="theme-opt-circle" data-theme="theme-neon"><i class="fa-solid fa-flask-vial"></i></div>
                <div class="theme-opt-circle" data-theme="theme-electric"><i class="fa-solid fa-bolt"></i></div>
                <div class="theme-opt-circle" data-theme="theme-kitty"><i class="fa-solid fa-cat"></i></div>
                <div class="theme-opt-circle" data-theme="theme-doggy"><i class="fa-solid fa-dog"></i></div>
                <div class="theme-opt-circle" data-theme="theme-thunderstorm"><i class="fa-solid fa-skull"></i></div>
                <div class="theme-opt-circle" data-theme="theme-arctic"><i class="fa-solid fa-snowflake"></i></div>
                <div class="theme-opt-circle" data-theme="theme-gamer"><i class="fa-solid fa-gamepad"></i></div>
                <div class="theme-opt-circle" data-theme="theme-xbox-bsod"><i class="fa-brands fa-xbox"></i></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="script.js"></script>
</body>
</html>
